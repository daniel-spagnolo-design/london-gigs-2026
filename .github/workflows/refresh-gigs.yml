name: Refresh gigs

# Re-fetches London gigs and rebuilds index.html on GitHub's servers, then
# commits the result so GitHub Pages redeploys. Trigger it by tapping
# "Run workflow" below (works from a phone browser), or let the weekly cron run.
#
# Requires two repository secrets (Settings -> Secrets and variables -> Actions):
#   TM_API_KEY     Ticketmaster Discovery API key
#   LIKED_ARTISTS  newline-separated list of your liked artist names
on:
  workflow_dispatch:
  schedule:
    # Mondays 06:00 UTC. The checker retires itself after 31 Aug 2026; this cron
    # window is bounded to the months that can still have new August gigs.
    - cron: "0 6 * 6,7,8 1"

# Allow the job to commit the regenerated files back to the repo.
permissions:
  contents: write

# Don't pile up overlapping refreshes.
concurrency:
  group: refresh-gigs
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install requests

      - name: Provide secrets to the checker
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
          LIKED_ARTISTS: ${{ secrets.LIKED_ARTISTS }}
        run: |
          # keys_local.py is what the checker imports; recreate it from secrets.
          # (It's git-ignored, so it never gets committed.)
          printf 'TM_API_KEY = "%s"\n' "$TM_API_KEY" > keys_local.py
          # The full Liked_Songs.csv is private; supply the compact name list.
          printf '%s\n' "$LIKED_ARTISTS" > liked_artists.txt

      - name: Fetch gigs and rebuild page
        run: |
          python3 london_gigs_checker.py
          node build.mjs

      - name: Commit refreshed files if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage, commit, and push the regenerated files. Returns non-zero if
          # the push is rejected (someone else pushed to main while we built).
          commit_and_push() {
            git add london_gigs_August2026.txt index.html gigs_seen.json version.json
            if git diff --cached --quiet; then
              echo "No gig changes — nothing to commit."
              return 0
            fi
            git commit -m "Refresh gigs ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          }

          # If main moved under us, adopt the latest main and rebuild the page on
          # top of it (the page is fully generated, so this is conflict-free and
          # also picks up any template changes), then retry the push.
          for attempt in 1 2 3; do
            if commit_and_push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebuilding on latest main…"
            cp london_gigs_August2026.txt "$RUNNER_TEMP/gigs.txt"  # keep fresh gig data
            git fetch origin main
            git reset --hard origin/main                            # discard our commit, adopt latest
            cp "$RUNNER_TEMP/gigs.txt" london_gigs_August2026.txt
            node build.mjs                                          # regenerate index.html, version.json, gigs_seen.json
          done

          echo "Could not push after 3 attempts." >&2
          exit 1
